<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - دعوتي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <style>
        body { background-color: #f4f6f9; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 420px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="card login-card p-4 bg-white">
    <h3 class="text-center text-primary mb-4">🔐 تسجيل الدخول منصة دعوتي</h3>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} text-center p-2">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">اسم الحساب:</label>
            <input type="text" name="username" class="form-control" placeholder="أدخل اسم المستخدم المعين لك" required>
        </div>
        <div class="mb-3">
            <label class="form-label">رقم الهاتف المرتبط:</label>
            <input type="text" name="phone" class="form-control" placeholder="05xxxxxxxx" required>
        </div>
        <div class="mb-3">
            <label class="form-label">كلمة المرور:</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 font-weight-bold">التالي (طلب رمز التحقق) 📲</button>
    </form>
    <div class="text-center mt-3">
        <a href="/forgot-password" class="text-secondary small text-decoration-none">نسيت كلمة المرور؟</a>
    </div>
</div>
</body>
</html>
