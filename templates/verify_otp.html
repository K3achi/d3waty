<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التحقق من الهاتف - دعوتي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
<div class="card p-4 shadow-sm text-center" style="width: 100%; max-width: 400px; border-radius: 15px;">
    <h4>📲 تأكيد رقم الجوال</h4>
    <p class="text-muted small">قم بإدخال رمز التحقق المستلم لإكمال الدخول بأمان</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} p-2 small">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST">
        <div class="mb-3">
            <input type="text" name="otp" class="form-control text-center fs-3 font-weight-bold" placeholder="123456" required autocomplete="off">
        </div>
        <button type="submit" class="btn btn-success w-100">تأكيد ودخول المنصة</button>
    </form>
</div>
</body>
</html>
