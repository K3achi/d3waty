<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>استعادة الحساب - دعوتي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
<div class="card p-4 shadow-sm" style="width: 100%; max-width: 420px; border-radius: 15px;">
    <h4 class="text-center mb-3">🔄 استعادة كلمة المرور عبر الجوال</h4>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} p-2 text-center small">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">رقم الهاتف المسجل للحساب:</label>
            <input type="text" name="phone" class="form-control" placeholder="05xxxxxxxx" required>
        </div>
        <div class="mb-3">
            <label class="form-label">كلمة المرور الجديدة والقوية:</label>
            <input type="password" name="new_password" class="form-control" placeholder="اكتب كلمة مرور معقدة وقوية" required>
            <div class="form-text text-muted small">يجب أن تحتوي على 8 خانات، حروف كبيرة وصغيرة، رموز وأرقام.</div>
        </div>
        <button type="submit" class="btn btn-warning w-100 font-weight-bold">تحديث و تعيين كلمة المرور</button>
    </form>
    <div class="text-center mt-3"><a href="/login" class="small text-decoration-none">العودة لتسجيل الدخول</a></div>
</div>
</body>
</html>
